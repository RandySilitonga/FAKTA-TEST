# FAKTA LSTM Training Configuration

# Tokenizer
max_words: 20000      # Vocabulary size
max_len: 200          # Maximum sequence length (padding)

# Embedding
embedding_dim: 128    # Word embedding dimension

# LSTM Architecture
lstm_units: 64        # Number of LSTM units (per layer)
use_bidirectional: true
dropout_rate: 0.3

# Training
epochs: 20
batch_size: 64
learning_rate: 0.001
patience: 5           # Early stopping patience

# Data
test_split: 0.15
val_split: 0.15
random_seed: 42
